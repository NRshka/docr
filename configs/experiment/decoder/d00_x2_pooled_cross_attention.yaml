# @package _global_
# D00-X2: one pooled visual start token plus full-grid visual cross-attention.
model:
  name: decoder-d00-x2-pooled-cross-attention
  decoder:
    mode: ar

train:
  name: ar
  strategy: ddp_find_unused_parameters_true
  init_weights_from: null
  init_weights_strict: true
  resume_from_checkpoint: null
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  pretrained_learning_rate: 1.0e-5
  weight_decay: 0.01
  scheduler: cosine
  warmup_steps: 0.1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  float32_matmul_precision: high
  precision: bf16
  max_steps: 500
  checkpoint_interval: 250
  log_interval: 10
  validate: true
  val_batch_size: 2
  val_check_interval: 1000
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0

output_dir: outputs/decoder/d00_x2_pooled_cross_attention
logging:
  run_name: decoder-d00-x2-pooled-cross-attention
  tags: [decoder-study, d00-x2, pooled-prefix, gated-cross-attention, cogvit, frozen-vision]
