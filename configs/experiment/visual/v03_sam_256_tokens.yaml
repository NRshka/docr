# @package _global_
# Compression stress point: 3x fewer visual tokens than the control.
model:
  name: joint_qwen-v03-sam-256
  image_size: [1024, 1024]
  visual_tokens: 256
  vision:
    backbone: sam
    freeze_backbone: true
  compressor:
    type: perceiver
    num_layers: 2

train:
  batch_size: 4
  gradient_accumulation_steps: 2
  max_steps: 2000
  checkpoint_interval: 500
  val_check_interval: 250

output_dir: outputs/visual/v03_sam_256_tokens
logging:
  run_name: visual-v03-sam-256
  tags: [visual-study, compression, sam, tokens-256]

