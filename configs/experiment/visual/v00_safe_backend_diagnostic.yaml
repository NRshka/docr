# @package _global_
# Confirms stable fused SDPA selection at the intended batch size after math SDPA passed.
model:
  name: joint_qwen-v00-safe-backend-diagnostic
  image_size: [1024, 1024]
  visual_tokens: 768
  vision:
    backbone: sam
    freeze_backbone: true
  compressor:
    type: perceiver
    num_layers: 2
  decoder:
    sdpa_backend: safe

train:
  batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5
  pretrained_learning_rate: 1.0e-5
  scheduler: cosine
  warmup_steps: 0.1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm
  float32_matmul_precision: high
  detect_anomaly: false
  max_steps: 120
  checkpoint_interval: 0
  log_interval: 1
  validate: false
  probe_interval: 0
  probe_timesteps: []
  probe_visual_ablations: []

output_dir: outputs/visual/v00_safe_backend_diagnostic
logging:
  run_name: visual-v00-safe-backend-diagnostic
  tags: [visual-study, control, stability, safe-sdpa]
