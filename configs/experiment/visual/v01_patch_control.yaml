# @package _global_
# Tests whether frozen SAM features beat a trainable, but shallow, patch stem.
model:
  name: joint_qwen-v01-patch-768
  image_size: [1024, 1024]
  visual_tokens: 768
  vision:
    backbone: patch
    patch_size: 16
    hidden_size: 512
    positional_embedding: learned_2d
  compressor:
    type: perceiver
    num_layers: 2

train:
  batch_size: 2
  gradient_accumulation_steps: 4
  max_steps: 2000
  checkpoint_interval: 500
  val_check_interval: 250

output_dir: outputs/visual/v01_patch_control
logging:
  run_name: visual-v01-patch-768
  tags: [visual-study, control, patch]

