# @package _global_
# Measures the value of adapting the SAM visual backbone to OCR.
model:
  name: joint_qwen-v02-sam-unfrozen-768
  image_size: [1024, 1024]
  visual_tokens: 768
  vision:
    backbone: sam
    freeze_backbone: false
  compressor:
    type: perceiver
    num_layers: 2

train:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  max_steps: 2000
  checkpoint_interval: 500
  val_check_interval: 250

output_dir: outputs/visual/v02_sam_unfrozen
logging:
  run_name: visual-v02-sam-unfrozen-768
  tags: [visual-study, sam, unfrozen]

