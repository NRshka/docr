# @package _global_
# Fidelity stress point: more visual evidence than the control.
model:
  name: joint_qwen-v04-sam-1024
  image_size: [1024, 1024]
  visual_tokens: 1024
  vision:
    backbone: sam
    freeze_backbone: true
  compressor:
    type: perceiver
    num_layers: 2

train:
  batch_size: 1
  gradient_accumulation_steps: 8
  max_steps: 2000
  checkpoint_interval: 500
  val_check_interval: 250

output_dir: outputs/visual/v04_sam_1024_tokens
logging:
  run_name: visual-v04-sam-1024
  tags: [visual-study, compression, sam, tokens-1024]

