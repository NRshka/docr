name: draft_refine
image_size: [1024, 768]
visual_tokens: 768
vision:
  backbone: patch
  backbone_name: facebook/sam-vit-base
  freeze_backbone: true
  local_files_only: false
  trust_remote_code: false
  patch_size: 16
  hidden_size: 512
  num_layers: 4
  positional_embedding: learned_2d
  max_grid_size: 256
compressor:
  type: perceiver
  num_queries: ${model.visual_tokens}
  num_layers: 2
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
decoder:
  backbone_name: gpt2
  hidden_size: 512
  mode: draft_refine
canvas:
  length: 128
  num_canvases: 1
diffusion:
  timesteps: 32
  mask_token_id: 50256
refinement:
  entropy_threshold: 1.5
loss_weights:
  ar: 1.0
  diffusion: 0.5
  refinement: 1.0
