name: joint
batch_size: 1
learning_rate: 5.0e-5
weight_decay: 0.01
optimizer: adamw
scheduler: cosine
precision: bf16
accelerator: auto
devices: auto
strategy: auto
suppress_accumulate_grad_stream_warning: true
gradient_accumulation_steps: 4
max_steps: 1000
checkpoint_interval: 250
log_interval: 10
probe_interval: 50
probe_timesteps: [1, 4, 8, 16, 24, 31]
probe_visual_ablations:
  - normal
  - blank
  - shuffled
