name: draft_refine
batch_size: 2
learning_rate: 8.0e-5
weight_decay: 0.01
optimizer: adamw
scheduler: cosine
precision: fp32
accelerator: auto
devices: auto
strategy: auto
suppress_accumulate_grad_stream_warning: true
gradient_accumulation_steps: 1
max_steps: 1000
checkpoint_interval: 250
log_interval: 10
validate: true
val_batch_size: ${train.batch_size}
val_check_interval: 250
check_val_every_n_epoch: 1
num_sanity_val_steps: 0
val_probe_timesteps: [1, 8, 16, 31]
val_visual_ablations:
  - normal
  - blank
  - shuffled
probe_interval: 50
probe_timesteps: [1, 4, 8, 16, 24, 31]
probe_visual_ablations:
  - normal
  - blank
  - shuffled
